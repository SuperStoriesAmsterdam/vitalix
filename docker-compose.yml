services:

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://vitalix:VitalixGo2026!@db:5432/vitalix
      REDIS_HOST: redis
      REDIS_PORT: 6379
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build: .
    command: ["arq", "app.worker.WorkerSettings"]
    environment:
      DATABASE_URL: postgresql://vitalix:VitalixGo2026!@db:5432/vitalix
      REDIS_HOST: redis
      REDIS_PORT: 6379
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: vitalix
      POSTGRES_USER: vitalix
      POSTGRES_PASSWORD: "VitalixGo2026!"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vitalix -d vitalix"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
